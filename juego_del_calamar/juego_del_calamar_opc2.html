<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juego del Calamar Infotep</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
  background:#000;
  color:white;
  text-align:center;
}

/* FONDO PRO */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:
    radial-gradient(circle at 20% 30%, #ff005580, transparent 40%),
    radial-gradient(circle at 80% 70%, #00ff9c80, transparent 40%);
  z-index:-1;
}

/* TITULO */
h1{
  color:#ff0055;
  text-shadow:0 0 20px #ff0055;
  margin:10px;
}

/* BOTONES */
.controls{
  margin:10px;
}

button{
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  margin:5px;
}

.scan-btn{
  background:#00ff9c;
  color:black;
  font-size:18px;
  box-shadow:0 0 15px #00ff9c;
}

.start-btn{
  background:#ff0055;
  color:white;
}

/* INPUT OCULTO */
#cameraInput{
  display:none;
}

/* TABLERO */
.board{
  display:grid;
  grid-template-columns:repeat(10,1fr);
  gap:4px;
  width:95vw;
  margin:auto;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  border-radius:15px;
  padding:10px;
}

/* CUADROS */
.card{
  aspect-ratio:1/1;
  border-radius:15px;
  overflow:hidden;
  cursor:pointer;
  position:relative;
  transition:0.2s;
}

.card:hover{
  transform:scale(1.05);
}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* NUMERO */
.number{
  position:absolute;
  bottom:5px;
  left:50%;
  transform:translateX(-50%);
  font-size:20px;
  font-weight:bold;
  background:rgba(0,0,0,0.6);
  padding:3px 10px;
  border-radius:10px;
  color:#00fff7;
}

/* ELIMINADO */
.card.eliminated img{
  filter:grayscale(100%) brightness(0.2);
}

.card.eliminated::after{
  content:"✖";
  position:absolute;
  font-size:70px;
  color:red;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}

/* ANIMACION REGISTRO */
.flash{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#00ff9c;
  opacity:0;
  pointer-events:none;
}

.flash.active{
  animation:flashAnim 0.4s;
}

@keyframes flashAnim{
  0%{opacity:0.8;}
  100%{opacity:0;}
}

/* TEXTO REGISTRO */
.register-msg{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:30px;
  color:#00ff9c;
  opacity:0;
}

.register-msg.show{
  animation:showMsg 1s;
}

@keyframes showMsg{
  0%{opacity:1;transform:translate(-50%,-40%);}
  100%{opacity:0;transform:translate(-50%,-60%);}
}

/* MODO JUEGO */
.game-mode h1,
.game-mode .controls{
  display:none;
}
</style>
</head>

<body>

<h1>JUEGOS DEL CALAMAR INFOTEP</h1>

<div class="controls">
  <button class="scan-btn" onclick="openCamera()">📸 ESCANEAR JUGADOR</button>
  <button class="start-btn" onclick="startGame()">INICIAR JUEGO</button>
</div>

<input type="file" id="cameraInput" accept="image/*" capture="environment">

<div class="board" id="board"></div>

<div class="flash" id="flash"></div>
<div class="register-msg" id="msg">JUGADOR REGISTRADO</div>

<script>
const board = document.getElementById('board');
let contador = 1;

/* 🎤 VOZ */
function hablar(texto){
  const msg = new SpeechSynthesisUtterance(texto);
  msg.lang="es-ES";
  msg.pitch=1.3;
  msg.rate=0.85;
  speechSynthesis.speak(msg);
}

/* 📸 ABRIR CAMARA */
function openCamera(){
  document.getElementById('cameraInput').click();
}

/* 📥 CAPTURA */
document.getElementById('cameraInput').addEventListener('change', function(){
  const file = this.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(e){

    const numeroReal = contador;
    const numeroVisual = String(contador).padStart(3,'0');
    contador++;

    const card = document.createElement('div');
    card.className='card';

    card.innerHTML=`
      <img src="${e.target.result}">
      <div class="number">${numeroVisual}</div>
    `;

    card.onclick=()=>{
      card.classList.toggle('eliminated');

      if(card.classList.contains('eliminated')){
        hablar("Jugador " + numeroReal + " eliminado");
      }
    };

    board.appendChild(card);

    /* EFECTOS */
    flashEffect();
    showMessage();
    hablar("Jugador " + numeroReal + " registrado");
  };

  reader.readAsDataURL(file);
});

/* EFECTOS */
function flashEffect(){
  const flash = document.getElementById('flash');
  flash.classList.add('active');
  setTimeout(()=>flash.classList.remove('active'),400);
}

function showMessage(){
  const msg = document.getElementById('msg');
  msg.classList.add('show');
  setTimeout(()=>msg.classList.remove('show'),1000);
}

/* FULL SCREEN */
function startGame(){
  document.body.classList.add('game-mode');
  if(document.documentElement.requestFullscreen){
    document.documentElement.requestFullscreen();
  }
}
</script>

</body>
</html>
